<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Lab App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo Laboratorio">
            <h2>Laboratorio Médico</h2>
            <p>Por favor inicie sesión para continuar</p>
            
            {% if error %}
            <div class="login-error">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Ingresa tu usuario" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-submit">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
